<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wake Up!</title>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; background-color: #000; overflow: hidden; font-family: 'DotGothic16', sans-serif; touch-action: none; }
        canvas { display: block; image-rendering: pixelated; image-rendering: crisp-edges; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/addons/p5.sound.min.js"></script>
</head>
<body>
    <script>
        let PIXEL_SCALE = 4;
        let imgSleep, imgWakeup, imgSleepMore, playerImg;

        let bgm;
        let isBgmStarted = false;

        let sndButukaru, sndCorrect, sndIncorrect, sndKirakira;

        let chars = [];
        let slots = [];
        let particles = [];
        let backgroundStars = [];
        let zzzs = []; 
        let zzzTimer = 0; // zzzエフェクトの管理タイマー
        
        let starAlpha = 0;
        let player;

        let state = "sleep";
        let wakeupTimer = 0;
        let monsterShakeTimer = 0;

        let sleepMoreTimer = 0;
        let owariAlpha = 0;
        
        let fadeAlpha = 255; // 暗転からのフェードイン用

        // 【追加】言葉が揃った時のアニメーション管理
        let clearState = ""; 
        let clearTimer = 0;

        // 【追加】正解ルートの定義
        const PATH_OKITE = ['お', 'き', 'て'];
        const PATH_CHUU  = ['ち', 'ゅ', 'う'];

        function preload() {
            imgSleep = loadImage('monster_sleep.gif');
            imgWakeup = loadImage('monster_wakeup.gif');
            imgSleepMore = loadImage('monster_sleep_more.gif');
            playerImg = loadImage('player.gif');

            bgm = loadSound('kataomoi.mp3');

            sndButukaru = loadSound('snd_monster_butukaru.wav');
            sndCorrect = loadSound('snd_correct.wav');
            sndIncorrect = loadSound('snd_incorrect.wav');
            sndKirakira = loadSound('snd_kirakira.wav');
        }

        function setup() {
            createCanvas(windowWidth, windowHeight);
            frameRate(60);
            
            if (windowWidth < 600) {
                PIXEL_SCALE = 2;
            } else {
                PIXEL_SCALE = 4;
            }
            pixelDensity(1);
            noSmooth();
            imageMode(CENTER);
            textAlign(CENTER, CENTER);
            textFont('DotGothic16');

            if (sndButukaru) sndButukaru.setVolume(0.25);
            if (sndCorrect) sndCorrect.setVolume(0.25);
            if (sndIncorrect) sndIncorrect.setVolume(0.25);
            if (sndKirakira) sndKirakira.setVolume(0.25);

            let logicalW = width / PIXEL_SCALE;
            let logicalH = height / PIXEL_SCALE;

            if (playerImg) playerImg.pause();

            player = new Player(logicalW - 20, logicalH / 2);

            let starCount = floor((logicalW * logicalH) / 240);
            for (let i = 0; i < starCount; i++) {
                backgroundStars.push({
                    x: random(logicalW),
                    y: random(logicalH),
                    offset: random(100)
                });
            }

            let slotY = 30;
            let slotStartX = logicalW / 2 - 30;
            slots.push({ x: slotStartX, y: slotY, filled: false, charObj: null });
            slots.push({ x: slotStartX + 30, y: slotY, filled: false, charObj: null });
            slots.push({ x: slotStartX + 60, y: slotY, filled: false, charObj: null });

            let initialText = "てきおうちゅう";
            let charStartX = logicalW / 2 - (initialText.length * 16) / 2;
            let centerY = logicalH / 2;
            let charBaseY = (slotY + centerY) / 2;

            for (let i = 0; i < initialText.length; i++) {
                chars.push(new PushableChar(initialText[i], charStartX + i * 16, charBaseY));
            }
        }

        function draw() {
            background(0);
            
            push();
            scale(PIXEL_SCALE);

            let logicalW = width / PIXEL_SCALE;
            let logicalH = height / PIXEL_SCALE;
            let centerX = logicalW / 2;
            let centerY = logicalH / 2;

            if (state === "sleep_more") {
                if (starAlpha < 255) starAlpha += 2;

                noStroke();
                for (let s of backgroundStars) {
                    let n = sin(frameCount * 0.01 + s.offset);
                    if (n > 0.8) {
                        fill(255, 255, 255, starAlpha);
                        rect(floor(s.x), floor(s.y), 2, 2);
                    } else if (n > 0.3) {
                        fill(120, 120, 120, starAlpha);
                        rect(floor(s.x), floor(s.y), 1, 1);
                    }
                }
            }

            if (state === "sleep") {
                noStroke();
                for (let s of slots) {
                    fill(255, 255, 255, 50);
                    circle(s.x, s.y, 20);
                }
            }

            // 【変更】zのエフェクトを小文字にし、3回連続→全消滅→1秒待機 のサイクルにする
            if (state === "sleep" || state === "sleep_more") {
                zzzTimer++;
                // 20フレームごとに3回出す
                if (zzzTimer === 20) zzzs.push(new Zzz(centerX + 15, centerY - 20));
                if (zzzTimer === 40) zzzs.push(new Zzz(centerX + 25, centerY - 30));
                if (zzzTimer === 60) zzzs.push(new Zzz(centerX + 35, centerY - 40));
                // 3つ目の寿命(60f)が尽きるのが120フレーム目。そこから1秒(60f)待つので合計180でリセット
                if (zzzTimer > 180) zzzTimer = 0; 
            }

            for (let i = zzzs.length - 1; i >= 0; i--) {
                zzzs[i].update();
                zzzs[i].draw();
                if (zzzs[i].life <= 0) zzzs.splice(i, 1);
            }

            if (state === "sleep") {
                let drawX = centerX;
                let drawY = centerY;

                if (dist(player.x, player.y, centerX, centerY) < 25) {
                    if (monsterShakeTimer <= 0 && sndButukaru) sndButukaru.play();
                    monsterShakeTimer = 75;
                    let angle = atan2(player.y - centerY, player.x - centerX);
                    player.vx = cos(angle) * 5;
                    player.vy = sin(angle) * 5;
                    player.targetX = player.x;
                    player.targetY = player.y;
                }

                if (monsterShakeTimer > 0) {
                    drawX += sin(frameCount * 0.5) * 3;
                    monsterShakeTimer--;
                }

                if (imgSleep) image(imgSleep, drawX, drawY);
                checkClearCondition();
            }
            else if (state === "wakeup") {
                push();
                translate(centerX, centerY);
                if (imgWakeup) image(imgWakeup, 0, 0);
                pop();

                if (wakeupTimer < 60) {
                    for (let i = 0; i < 40; i++) {
                        fill(random(100, 255), random(100, 255), random(100, 255));
                        rect(random(logicalW), random(logicalH), 2, 2);
                    }
                }

                wakeupTimer++;
                if (wakeupTimer > 240) {
                    state = "sleep_more";
                    sleepMoreTimer = 0;
                }
            }
            else if (state === "sleep_more") {
                if (imgSleepMore) image(imgSleepMore, centerX, centerY);

                sleepMoreTimer++;
                if (sleepMoreTimer > 180) {
                    if (owariAlpha < 255) owariAlpha += 0.2;
                }

                fill(255, 255, 255, owariAlpha);
                textSize(20);
                text("おわり", centerX, centerY - 40);
            }

            if (state === "sleep") {
                player.update();
                player.draw();

                // 【追加】「おきて」と「ちゅう」が揃った時の特殊アニメーション処理
                if (clearState === "okite_anim") {
                    clearTimer++;
                    for (let s of slots) {
                        // 30フレーム(0.5秒)かけて透明度を0にする
                        if (s.charObj) s.charObj.alpha = map(clearTimer, 0, 30, 255, 0);
                    }
                    if (clearTimer >= 30) {
                        state = "wakeup"; // 完全に消えたら起きる
                        wakeupTimer = 0;
                        clearState = "done";
                        if (sndKirakira) sndKirakira.play();
                        for (let i = 0; i < 150; i++) {
                            let p = new Particle(random(logicalW), random(logicalH), 'colorful'); 
                            p.vx = random(-0.5, 0.5); p.vy = random(-0.5, 0.5); p.life = random(60, 120); 
                            particles.push(p);
                        }
                    }
                } 
                else if (clearState === "chuu_anim") {
                    clearTimer++;
                    for (let s of slots) {
                        if (s.charObj) {
                            if (clearTimer <= 30) {
                                // 前半：2倍に膨らみながら赤く染まる
                                s.charObj.scale = map(clearTimer, 0, 30, 1.0, 2.0);
                                s.charObj.color = lerpColor(color(255), color(255, 50, 50), clearTimer / 30.0);
                            } else if (clearTimer <= 45) {
                                // 後半：1.5倍に少し落ち着く（風船が張るような演出）
                                s.charObj.scale = map(clearTimer, 30, 45, 2.0, 1.5);
                            }
                        }
                    }
                    if (clearTimer === 45) {
                        if (sndKirakira) sndKirakira.play();
                        for (let s of slots) {
                            for (let i = 0; i < 30; i++) particles.push(new Particle(s.x, s.y, 'heart'));
                            let idx = chars.indexOf(s.charObj);
                            if (idx > -1) chars.splice(idx, 1);
                            s.filled = false;
                            s.charObj = null;
                        }
                        clearState = ""; // 消滅したら元に戻してプレイ続行
                    }
                }

                for (let c of chars) {
                    c.update();
                    c.draw();
                }
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.update();
                p.draw();
                if (p.life <= 0) particles.splice(i, 1);
            }
            pop();

            if (fadeAlpha > 0) {
                fill(0, 0, 0, fadeAlpha);
                rect(0, 0, width, height);
                fadeAlpha -= 5;
            }
        }

        function mousePressed() {
            if (bgm && !isBgmStarted) {
                isBgmStarted = true;
                bgm.playMode('restart');
                bgm.setVolume(0.5); 
                
                let savedTime = sessionStorage.getItem('bgmTime');
                if (savedTime) {
                    bgm.loop();
                    bgm.jump(parseFloat(savedTime));
                    sessionStorage.removeItem('bgmTime');
                } else {
                    bgm.loop();
                }
            }

            if (state !== "sleep") return;
            let realX = mouseX / PIXEL_SCALE;
            let realY = mouseY / PIXEL_SCALE;
            player.targetX = realX;
            player.targetY = realY;

            for (let i = 0; i < 5; i++) {
                particles.push(new Particle(realX, realY, 'white'));
            }
        }

        function checkClearCondition() {
            let allFilled = true;
            for (let s of slots) {
                if (!s.filled) allFilled = false;
            }
            
            // 揃った瞬間に、どっちのルートのアニメーションを流すか決める
            if (allFilled && clearState === "") {
                let word = slots[0].charObj.char + slots[1].charObj.char + slots[2].charObj.char;
                if (word === "おきて") {
                    clearState = "okite_anim";
                    clearTimer = 0;
                } 
                else if (word === "ちゅう") {
                    clearState = "chuu_anim";
                    clearTimer = 0;
                }
            }
        }

        // 【追加】Zzzクラス（角度をゆらゆらさせる）
        class Zzz {
            constructor(x, y) {
                this.x = x; this.y = y;
                this.life = 60; // 1秒で消える
                this.baseX = x; // 揺れの中心点
                this.offsetY = random(100);
            }
            update() {
                this.y -= 0.3; // ゆっくり上に上がる
                this.life--;
            }
            draw() {
                let alpha = map(this.life, 0, 60, 0, 255);
                fill(255, 255, 255, alpha);
                textSize(12);
                push();
                let curX = this.baseX + sin(frameCount * 0.05 + this.offsetY) * 6; // 左右に揺れる
                translate(curX, this.y);
                rotate(sin(frameCount * 0.1) * 0.4); // 角度もゆらゆら揺れる
                text("z", 0, 0); // 小文字のz
                pop();
            }
        }

        class Player {
            constructor(x, y) {
                this.x = x; this.y = y;
                this.targetX = x; this.targetY = y;
                this.vx = 0; this.vy = 0;
                this.speed = 1.5;
                this.frameIdx = 0;
            }

            update() {
                if (abs(this.vx) > 0.1 || abs(this.vy) > 0.1) {
                    this.x += this.vx;
                    this.y += this.vy;
                    this.vx *= 0.85;
                    this.vy *= 0.85;
                    this.targetX = this.x;
                    this.targetY = this.y;
                }
                else {
                    let d = dist(this.x, this.y, this.targetX, this.targetY);
                    if (d > this.speed) {
                        let angle = atan2(this.targetY - this.y, this.targetX - this.x);
                        this.x += cos(angle) * this.speed;
                        this.y += sin(angle) * this.speed;
                        if (playerImg && playerImg.numFrames() > 0) {
                            this.frameIdx = floor(frameCount / 10) % playerImg.numFrames();
                        }
                    } else {
                        this.x = this.targetX; this.y = this.targetY;
                        this.frameIdx = 0;
                    }
                }

                let logicalW = width / PIXEL_SCALE;
                let logicalH = height / PIXEL_SCALE;
                let margin = 8;
                this.x = constrain(this.x, margin, logicalW - margin);
                this.y = constrain(this.y, margin, logicalH - margin);
            }

            draw() {
                if (!playerImg) return;
                playerImg.setFrame(this.frameIdx);
                push();
                translate(this.x, this.y);
                if (this.targetX < this.x) scale(-1, 1);
                image(playerImg, 0, 0);
                pop();
            }
        }

        class PushableChar {
            constructor(char, x, y) {
                this.char = char;
                this.x = x; this.y = y;
                this.startX = x; this.startY = y;
                this.vx = 0; this.vy = 0;
                this.isPushed = false;
                this.isLocked = false;
                this.isReturning = false;
                this.offsetY = random(100);
                
                // 【変更】無敵時間を30フレームに延長
                this.ignorePlayerTimer = 0; 
                
                // 【追加】アニメーション用のパラメータ
                this.scale = 1.0;
                this.color = color(255);
                this.alpha = 255;
            }

            update() {
                if (this.isLocked) return;

                if (this.isReturning) {
                    this.x = lerp(this.x, this.startX, 0.05);
                    this.y = lerp(this.y, this.startY, 0.05);
                    if (dist(this.x, this.y, this.startX, this.startY) < 1) {
                        this.x = this.startX;
                        this.y = this.startY;
                        this.isReturning = false;
                    }
                    return;
                }

                let logicalW = width / PIXEL_SCALE;
                let logicalH = height / PIXEL_SCALE;
                let centerX = logicalW / 2;
                let centerY = logicalH / 2;

                if (dist(this.x, this.y, centerX, centerY) < 25 && state === "sleep") {
                    if (monsterShakeTimer <= 0 && sndButukaru) sndButukaru.play();
                    monsterShakeTimer = 75;
                    let angle = atan2(this.y - centerY, this.x - centerX);
                    this.vx = cos(angle) * 4;
                    this.vy = sin(angle) * 4;
                }

                if (this.ignorePlayerTimer > 0) {
                    this.ignorePlayerTimer--;
                    this.isPushed = false;
                } else {
                    let d = dist(player.x, player.y, this.x, this.y);
                    let minDist = 24;
                    if (d < minDist) {
                        let angle = atan2(this.y - player.y, this.x - player.x);
                        this.vx += cos(angle) * 1.5; 
                        this.vy += sin(angle) * 1.5;
                        this.isPushed = true;
                    } else {
                        this.isPushed = false;
                    }
                }

                this.vx = constrain(this.vx, -12, 12);
                this.vy = constrain(this.vy, -12, 12);

                this.x += this.vx;
                this.y += this.vy;

                this.vx *= 0.85;
                this.vy *= 0.85;

                let margin = 12; 
                let bounceForce = 5.0; 
                let bounced = false;

                if (this.x < margin) {
                    this.x = margin;
                    this.vx = bounceForce; 
                    bounced = true;
                } else if (this.x > logicalW - margin) {
                    this.x = logicalW - margin;
                    this.vx = -bounceForce;
                    bounced = true;
                }

                if (this.y < margin) {
                    this.y = margin;
                    this.vy = bounceForce;
                    bounced = true;
                } else if (this.y > logicalH - margin) {
                    this.y = logicalH - margin;
                    this.vy = -bounceForce;
                    bounced = true;
                }

                // 【変更】壁バウンド直後のすり抜け時間を30フレームに設定
                if (bounced) {
                    this.ignorePlayerTimer = 30;
                }

                // 【追加】丸に入るための「厳密な文字制限」の判定
                let activePath = 0; // 0:両方OK、1:おきてルート、2:ちゅうルート
                for (let i = 0; i < 3; i++) {
                    if (slots[i].filled) {
                        let c = slots[i].charObj.char;
                        if (PATH_OKITE.includes(c)) activePath = 1;
                        if (PATH_CHUU.includes(c)) activePath = 2;
                    }
                }

                for (let i = 0; i < 3; i++) {
                    let s = slots[i];
                    if (dist(this.x, this.y, s.x, s.y) < 10 && !s.filled) {
                        
                        // このスロットに入っても良い文字かどうかのチェック
                        let canEnter = false;
                        if ((activePath === 0 || activePath === 1) && this.char === PATH_OKITE[i]) canEnter = true;
                        if ((activePath === 0 || activePath === 2) && this.char === PATH_CHUU[i]) canEnter = true;

                        if (canEnter) {
                            this.x = s.x; this.y = s.y;
                            this.vx = 0;
                            this.vy = 0;
                            this.isLocked = true;
                            
                            s.filled = true;
                            s.charObj = this; 

                            if (sndCorrect) sndCorrect.play();

                            // 【復活＆増加】入った瞬間のエフェクトパーティクルを30個に
                            for (let p = 0; p < 30; p++) {
                                particles.push(new Particle(s.x, s.y, 'colorful'));
                            }
                            break; // 1つのスロットに入ったらループ終了
                        } else if (!this.isLocked && !this.isReturning) {
                            // 入ってはいけない文字だった場合は弾き返す
                            this.isReturning = true;
                            if (sndIncorrect) sndIncorrect.play();
                        }
                    }
                }
            }

            draw() {
                push();
                let drawY = this.y;
                if (!this.isPushed && !this.isLocked && state === "sleep" && !this.isReturning) {
                    drawY += sin(frameCount * 0.05 + this.offsetY) * 3;
                }

                translate(this.x, drawY);

                // アニメーション中の色の計算
                if (this.isReturning) {
                    fill(255, 50, 50, this.alpha);
                } else if (this.isPushed) {
                    fill(255, 255, 0, this.alpha);
                } else {
                    let r = red(this.color);
                    let g = green(this.color);
                    let b = blue(this.color);
                    fill(r, g, b, this.alpha);
                }

                scale(this.scale); // ちゅう の風船アニメ用
                noStroke();
                textSize(14);
                text(this.char, 0, 0);
                pop();
            }
        }

        class Particle {
            constructor(x, y, type) {
                this.x = x; this.y = y;
                this.type = type;
                let angle = random(TWO_PI);
                
                if (type === 'heart') {
                    let speed = random(1.0, 3.0);
                    this.vx = cos(angle) * speed;
                    this.vy = sin(angle) * speed - 1.0; 
                    this.life = 60;
                } else {
                    let speed = random(0.5, 2.5);
                    this.vx = cos(angle) * speed;
                    this.vy = sin(angle) * speed;
                    this.life = 40;
                }
                
                if (type === 'colorful') {
                    this.col = color(random(150, 255), random(150, 255), random(150, 255));
                } else if (type === 'heart') {
                    this.col = color(255, 50, 50); 
                } else {
                    this.col = color(255);
                }
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                this.life--;
            }
            draw() {
                if (this.type === 'heart') {
                    let alpha = map(this.life, 0, 60, 0, 255);
                    fill(255, 50, 50, alpha);
                    noStroke();
                    push();
                    translate(this.x, this.y);
                    rect(-1, -1, 1, 1); rect(1, -1, 1, 1);
                    rect(-2, 0, 5, 1);
                    rect(-1, 1, 3, 1);
                    rect(0, 2, 1, 1);
                    pop();
                } else {
                    let alpha = map(this.life, 0, 40, 0, 255);
                    let r = red(this.col), g = green(this.col), b = blue(this.col);
                    fill(r, g, b, alpha);
                    noStroke();
                    rect(this.x, this.y, 1, 1);
                }
            }
        }

        function windowResized() {
            if (windowWidth < 600) {
                PIXEL_SCALE = 2;
            } else {
                PIXEL_SCALE = 4;
            }
            resizeCanvas(windowWidth, windowHeight);
            pixelDensity(1);
            noSmooth(); 
        }
    </script>
</body>
</html>
