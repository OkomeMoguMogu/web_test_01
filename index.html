<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>My Game Portfolio</title>
    <style>
        /* 1. 全体の設定（黒基調、ど真ん中に配置） */
        body {
            background-color: #111; /* 背景を黒に */
            color: #fff; /* 文字を白に */
            display: flex;
            justify-content: center; /* 横方向の中心 */
            align-items: center; /* 縦方向の中心 */
            height: 100vh; /* 画面いっぱいの高さ */
            margin: 0;
            /* 丸っこくてかわいいフォントの指定 */
            font-family: 'Zen Maru Gothic', 'Hiragino Maru Gothic ProN', 'M PLUS Rounded 1c', sans-serif;
        }

        h1 {
            /* 連続クリックしても文字が青く選択されないようにする強力なおまじない */
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            
            font-size: 1.5em; /* 文字サイズを元の2/3くらいに縮小（デフォルトは約2em） */
            letter-spacing: 5px; /* 文字の間を5px離す */
        }

        /* 1文字ずつの基本スタイル */
        .char {
            display: inline-block;
            cursor: pointer;
            position: relative; /* ひび割れ線を描くための基準位置 */
            
            /* 【重要】アニメーションの支点を「下の中央」にする */
            /* これにより、足元は固定され、頭の方が大きく揺れるようになります */
            transform-origin: bottom center; 
        }

        /* 2. 頭が揺れるぷるんとしたアニメーション（縦には伸び縮みしない） */
        @keyframes wobble {
            0%   { transform: skewX(0deg); }
            20%  { transform: skewX(-15deg); } /* 左に傾く */
            40%  { transform: skewX(10deg); }  /* 右に傾く */
            60%  { transform: skewX(-5deg); }
            80%  { transform: skewX(2deg); }
            100% { transform: skewX(0deg); }   /* すぐに収束 */
        }

        /* クリック時に付与する揺れクラス */
        .jelly-active {
            animation: wobble 0.35s ease-out both; 
        }

        /* 3. 3回クリックされた時のひび割れクラス */
        .cracked {
            opacity: 0.7; /* 少し暗くする */
            transform: rotate(-3deg) translate(1px, 2px); /* ガクッとずれた感じを出す */
        }
        
        /* ひび割れの「線」をCSSで作るトリック */
        .cracked::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            /* 背景と同じ黒色（#111）の斜め線を文字の上に引き、割れ目を表現 */
            background: linear-gradient(70deg, transparent 40%, #111 45%, #111 55%, transparent 60%);
            pointer-events: none; /* 線がマウスクリックを邪魔しないようにする */
        }
    </style>
</head>
<body>

    <h1 id="target-text">ここをクリックして！</h1>

    <script>
        const h1Element = document.getElementById('target-text');
        const text = h1Element.textContent;
        
        h1Element.innerHTML = '';

        for (let i = 0; i < text.length; i++) {
            const char = text[i];
            
            const span = document.createElement('span');
            span.textContent = char;
            span.className = 'char';
            
            // 【追加】この文字が何回クリックされたかを記憶する変数
            let clickCount = 0;

            span.addEventListener('click', function() {
                // すでにひび割れていたら、もう揺らさない（お好みで変更可）
                if (this.classList.contains('cracked')) return;

                clickCount++; // クリック回数を1増やす

                if (clickCount >= 3) {
                    // 3回クリックされたら：揺れを止めて、ひび割れクラスを付ける
                    this.classList.remove('jelly-active');
                    this.classList.add('cracked');
                } else {
                    // 1〜2回目のクリック：プルッと揺らす
                    this.classList.remove('jelly-active');
                    void this.offsetWidth; 
                    this.classList.add('jelly-active');
                }
            });

            span.addEventListener('animationend', function() {
                this.classList.remove('jelly-active');
            });

            h1Element.appendChild(span);
        }
    </script>

</body>
</html>
