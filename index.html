<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>My Game Portfolio</title>
    <style>
        /* Webページの余白をなくし、スクロールバーを出さないようにする */
        body {
            margin: 0;
            padding: 0;
            background-color: #111; /* 背景を黒に */
            overflow: hidden;
        }
        /* p5.jsが作るキャンバス（描画エリア）の線を消す */
        canvas {
            display: block;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
</head>
<body>

    <script>
        // GameMakerの変数の定義と同じ
        let x = 0;
        let y = 0;
        let currentSize = 50; // 現在のサイズ
        const baseSize = 50;  // 基本のサイズ

        // 【Createイベント】最初に1回だけ呼ばれる
        function setup() {
            // 画面いっぱいのキャンバス（ルーム）を作成
            createCanvas(windowWidth, windowHeight);
            noStroke(); // 図形の枠線をオフにする
        }

        // 【Step + Drawイベント】毎フレーム呼ばれる（基本60FPS）
        function draw() {
            // 1. 毎フレーム背景を黒（#111に近い色）で塗りつぶしてリセットする
            background(17);

            // 2. 状態の更新（Step処理）
            // lerp（線形補間）を使って、現在の位置からマウスの位置へ徐々に近づける
            // 最後の数字（0.15）をいじると、追従するスピードが変わります
            x = lerp(x, mouseX, 0.15);
            y = lerp(y, mouseY, 0.15);

            // クリック中かどうかでサイズと色を変える（手触りの表現）
            if (mouseIsPressed) {
                // クリック中は少し潰れるようにサイズを大きくする
                currentSize = lerp(currentSize, baseSize * 1.5, 0.2);
                fill(255, 0, 85); // 赤色
            } else {
                // クリックを離すと元のサイズに戻る
                currentSize = lerp(currentSize, baseSize, 0.2);
                fill(255); // 白色
            }

            // 3. 描画（Draw処理）
            // 計算した x, y の位置に、計算した currentSize の大きさで円を描く
            ellipse(x, y, currentSize, currentSize);
        }

        // ウィンドウのサイズが変更された時にキャンバスのサイズも合わせる処理
        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>

</body>
</html>
