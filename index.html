<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>My Game Portfolio</title>
    <style>
        /* プリンのようなぷるんとしたアニメーションの定義 */
        /* 横に潰れる → 縦に伸びる を繰り返し、徐々に1（元のサイズ）に収束させる */
        @keyframes pudding {
            0%   { transform: scale(1, 1); }
            30%  { transform: scale(1.3, 0.7); }  /* 横にグシャッと潰れる */
            40%  { transform: scale(0.7, 1.3); }  /* 反動で縦にビヨンと伸びる */
            50%  { transform: scale(1.15, 0.85); }
            65%  { transform: scale(0.95, 1.05); }
            75%  { transform: scale(1.05, 0.95); }
            100% { transform: scale(1, 1); }      /* 最後に自然にピタッと止まる */
        }

        h1 {
            user-select: none; /* テキスト選択されないようにする */
        }

        /* 1文字ずつ適用する基本スタイル */
        .char {
            display: inline-block; /* Transform（変形）を効かせるために必須 */
            cursor: pointer;
            transition: color 0.2s; /* 色が元に戻る時もフワッとさせる */
        }

        /* クリックした時に付与するクラス */
        .jelly-active {
            /* infiniteを外し、1回だけ再生（ease-outで徐々に勢いを落とす） */
            animation: pudding 0.8s ease-out both; 
            color: #ff0055;
        }
    </style>
</head>
<body>

    <h1 id="target-text">ここをクリックして！</h1>

    <script>
        const h1Element = document.getElementById('target-text');
        const text = h1Element.textContent;
        
        // 1. 一旦h1の中身を空にする
        h1Element.innerHTML = '';

        // 2. 文字列を1文字ずつ分解して処理する
        for (let i = 0; i < text.length; i++) {
            const char = text[i];
            
            // 1文字を囲むための <span> タグを作る
            const span = document.createElement('span');
            span.textContent = char;
            span.className = 'char'; // CSSで定義した .char を付ける

            // 3. クリックされた時の処理
            span.addEventListener('click', function() {
                // 連打しても最初からアニメーションが再生されるようにするテクニック
                this.classList.remove('jelly-active');
                void this.offsetWidth; // ブラウザのアニメーション状態をリセットする魔法の1行
                
                // アニメーションクラスを付ける（これでプルンと動く）
                this.classList.add('jelly-active');
            });

            // 4. アニメーションが完全に終わった時の処理（状態を元に戻す）
            span.addEventListener('animationend', function() {
                this.classList.remove('jelly-active');
            });

            // h1の中に、作った <span> を追加していく
            h1Element.appendChild(span);
        }
    </script>

</body>
</html>
